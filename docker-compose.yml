version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env
    # Optionally mount volumes for hot reloading if needed in dev, but this is a deployment compose

  frontend:
    build:
      context: ./frontend/vectr-app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000 # Ideally, change this to an environment variable or actual production domain if accessible externally
    ports:
      - '80:80'
    depends_on:
      - backend
